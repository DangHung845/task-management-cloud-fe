<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - The Next Gen To Do App</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.78);
      --card: rgba(255, 255, 255, 0.08);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --line: rgba(148, 163, 184, 0.2);
      --primary: #7c3aed;
      --primary-2: #8b5cf6;
      --danger: #ef4444;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      --radius-xl: 28px;
      --radius-lg: 20px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.25), transparent 30%),
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.18), transparent 26%),
        linear-gradient(180deg, #0b1120 0%, #111827 100%);
    }

    .app {
      min-height: 100vh;
      padding: clamp(12px, 2vw, 28px);
    }

    .shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(290px, 330px) minmax(0, 1fr);
      gap: clamp(16px, 1.8vw, 24px);
      align-items: start;
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
    }

    .sidebar {
      min-height: calc(100vh - clamp(24px, 4vw, 48px));
      padding: clamp(18px, 2vw, 24px);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), #22c55e);
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 1.1rem;
      box-shadow: 0 12px 30px rgba(124, 58, 237, 0.35);
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 1.6rem; line-height: 1.1; }
    .subtitle { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      padding: 16px;
      border-radius: var(--radius-lg);
      background: var(--card);
      border: 1px solid var(--line);
    }

    .stat .value { font-size: 1.5rem; font-weight: 800; }
    .stat .label { color: var(--muted); font-size: 0.82rem; margin-top: 4px; }

    .sidebar-note {
      padding: 16px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
    }

    .sidebar-note ul {
      margin: 8px 0 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 0.95rem;
    }

    .main {
      min-width: 0;
      display: grid;
      gap: 14px;
      padding: clamp(18px, 2vw, 24px);
    }

    .top-card,
    .filter-card,
    .task-area {
      padding: 16px;
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
    }

    .top-card {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      grid-template-areas:
        "title desc userId priority date"
        ". . . . add";
      gap: 12px;
      align-items: end;
    }

    .top-card textarea {
      min-height: 46px;
      height: 46px;
      resize: none;
      align-self: center;
    }

    #quickTitle { grid-area: title; }
    #quickDescription { grid-area: desc; }
    #quickUserId { grid-area: userId; }
    #quickPriority { grid-area: priority; }
    #quickDueDate { grid-area: date; }

    .toolbar-btn {
      grid-area: add;
      justify-self: end;
      min-width: 118px;
      white-space: nowrap;
    }

    .edit-strip {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .edit-link,
    .clear-filters {
      border: none;
      background: transparent;
      color: #c4b5fd;
      cursor: pointer;
      font: inherit;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .edit-link:hover,
    .clear-filters:hover { color: #e9d5ff; }

    .filter-card {
      display: grid;
      gap: 12px;
    }

    .search-row input { width: 100%; }

    .filters-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
    }

    .section-heading {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .toolbar-note {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .chip-group,
    .check-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .check-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.2s ease;
      white-space: nowrap;
      user-select: none;
    }

    .check-chip:hover {
      background: rgba(124, 58, 237, 0.14);
      border-color: rgba(124, 58, 237, 0.4);
    }

    .check-chip input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: #8b5cf6;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 10px 24px rgba(124, 58, 237, 0.32);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.ghost {
      background: rgba(255,255,255,0.08);
      box-shadow: none;
      border: 1px solid var(--line);
      color: var(--text);
    }
    .btn.danger {
      background: rgba(239, 68, 68, 0.16);
      color: #fecaca;
      box-shadow: none;
      border: 1px solid rgba(239, 68, 68, 0.28);
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.07);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
      font: inherit;
    }

    input::placeholder, textarea::placeholder { color: #9ca3af; }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(124,58,237,0.8);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.18);
    }

    .priority-select option { background: #111827; }

    .task-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .task {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 18px;
      display: grid;
      gap: 14px;
      min-height: 210px;
      min-width: 0;
    }

    .top-priority { border-color: rgba(239,68,68,0.35); }
    .medium-priority { border-color: rgba(245,158,11,0.35); }
    .low-priority { border-color: rgba(34,197,94,0.28); }

    .task-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .task-title {
      font-size: 1.06rem;
      font-weight: 800;
      line-height: 1.35;
    }

    .task-desc {
      color: var(--muted);
      font-size: 0.93rem;
      line-height: 1.55;
      margin-top: 6px;
    }

    .task-priority-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .user-id-badge {
      background: rgba(59,130,246,0.14);
      color: #bfdbfe;
    }

    .priority-dropdown { position: relative; }

    .priority-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      line-height: 1;
    }

    .priority-toggle:hover {
      background: rgba(124,58,237,0.14);
      border-color: rgba(124,58,237,0.4);
    }

    .priority-arrow {
      display: inline-block;
      transition: transform 0.18s ease;
      font-size: 0.9rem;
      transform: rotate(0deg);
    }

    .priority-dropdown.open .priority-arrow {
      transform: rotate(180deg);
    }

    .priority-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 5;
      display: none;
      min-width: 150px;
      padding: 8px;
      border-radius: 16px;
      background: #111827;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .priority-dropdown.open .priority-menu {
      display: grid;
      gap: 6px;
    }

    .status-option {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      text-align: left;
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font: inherit;
    }

    .status-option:hover {
      background: rgba(124, 58, 237, 0.16);
      border-color: rgba(124, 58, 237, 0.25);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      font-size: 0.78rem;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      white-space: nowrap;
    }

    .pri-high { background: rgba(239,68,68,0.14); color: #fecaca; }
    .pri-med { background: rgba(245,158,11,0.14); color: #fde68a; }
    .pri-low { background: rgba(34,197,94,0.14); color: #bbf7d0; }
    .overdue { background: rgba(239,68,68,0.16); color: #fecaca; }
    .status-badge { background: rgba(59,130,246,0.16); color: #bfdbfe; font-weight: 800; }
    .created-badge { background: rgba(168,85,247,0.16); color: #e9d5ff; }
    .user-badge { background: rgba(14,165,233,0.16); color: #bae6fd; font-weight: 800; }

    .task-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: auto;
    }

    .empty {
      padding: 42px 20px;
      text-align: center;
      border: 1px dashed rgba(148, 163, 184, 0.3);
      border-radius: var(--radius-xl);
      color: var(--muted);
      background: rgba(255,255,255,0.03);
      grid-column: 1 / -1;
    }

    @media (max-width: 1180px) {
      .shell {
        grid-template-columns: minmax(280px, 320px) minmax(0, 1fr);
      }
      .top-card {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-areas:
          "title desc"
          "userId priority"
          "date add";
      }
      .toolbar-btn {
        justify-self: end;
        width: min(180px, 100%);
      }
      .task-list {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
    }

    @media (max-width: 980px), (orientation: portrait) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { min-height: auto; }

      .top-card {
        grid-template-columns: 1fr;
        grid-template-areas:
          "title"
          "desc"
          "userId"
          "priority"
          "date"
          "add";
      }

      .filters-row {
        grid-template-columns: 1fr;
      }

      .toolbar-btn {
        justify-self: stretch;
        width: 100%;
        min-width: 0;
      }

      .task-list {
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }
    }

    @media (max-width: 720px) {
      .app { padding: 12px; }
      .sidebar, .main { padding: 18px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .task-list { grid-template-columns: 1fr; }
      .toolbar-btn { width: 100%; }
      .priority-toggle { min-width: 112px; }
    }

    @media (orientation: landscape) and (max-height: 700px) {
      .app { padding: 12px; }
      .shell {
        width: 100%;
        grid-template-columns: minmax(260px, 300px) minmax(0, 1fr);
      }
      .sidebar {
        min-height: calc(100vh - 24px);
      }
      .task { min-height: 190px; }
    }

    @media (min-width: 1440px) {
      .shell {
        grid-template-columns: minmax(340px, 380px) minmax(0, 1fr);
      }
      .task-list { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
      .sidebar, .main { padding: 28px; }
    }

    @media (min-width: 1920px) {
      .shell {
        width: min(1640px, 100%);
        grid-template-columns: minmax(360px, 420px) minmax(0, 1fr);
      }
      .task-list { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <aside class="panel sidebar">
        <div class="brand">
          <div class="logo">TF</div>
          <div>
            <h1>TaskFlow</h1>
            <p class="subtitle">The next-gen to-do app</p>
          </div>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="value" id="totalCount">0</div>
            <div class="label">Total tasks</div>
          </div>
          <div class="stat">
            <div class="value" id="dueSoonCount">0</div>
            <div class="label">Due soon</div>
          </div>
          <div class="stat">
            <div class="value" id="highCount">0</div>
            <div class="label">High priority</div>
          </div>
          <div class="stat">
            <div class="value" id="doneCount">0</div>
            <div class="label">Completed</div>
          </div>
        </div>

        <div class="sidebar-note">
          <h3>Featuring group</h3>
          <ul>
            <li>Đặng Quang Hưng</li>
            <li>Trần Trọng Hưng</li>
            <li>Nguyễn Vũ Minh Quang</li>
          </ul>
        </div>
      </aside>

      <main class="panel main">
        <section class="top-card">
          <input id="quickTitle" type="text" placeholder="Add title" />
          <textarea id="quickDescription" placeholder="Add description"></textarea>
          <input id="quickUserId" type="text" placeholder="User ID" maxlength="20" />
          <select id="quickPriority" class="priority-select">
            <option value="low">Low priority</option>
            <option value="medium" selected>Medium priority</option>
            <option value="high">High priority</option>
          </select>
          <input id="quickDueDate" type="date" />
          <button class="btn toolbar-btn" id="quickAddTopBtn">+ Add Task</button>
          <div class="edit-strip" id="editStrip" style="display:none;">
            <button class="edit-link" id="cancelEditBtn" type="button">Cancel edit</button>
          </div>
        </section>

        <section class="filter-card">
          <div class="search-row">
            <input id="searchInput" type="text" placeholder="Search tasks..." />
          </div>
          <div class="filters-row">
            <div>
              <div class="section-heading">
                <h3>Priority</h3>
              </div>
              <div class="check-group" id="priorityChips">
                <label class="check-chip"><input type="checkbox" value="all" checked />All</label>
                <label class="check-chip"><input type="checkbox" value="high" />High</label>
                <label class="check-chip"><input type="checkbox" value="medium" />Medium</label>
                <label class="check-chip"><input type="checkbox" value="low" />Low</label>
              </div>
            </div>
            <div>
              <div class="section-heading">
                <h3>Due date</h3>
              </div>
              <div class="check-group" id="dateChips">
                <label class="check-chip"><input type="checkbox" value="all" checked />All</label>
                <label class="check-chip"><input type="checkbox" value="overdue" />Overdue</label>
                <label class="check-chip"><input type="checkbox" value="today" />Today</label>
                <label class="check-chip"><input type="checkbox" value="week" />This week</label>
              </div>
            </div>
          </div>
          <div style="display:flex; justify-content:flex-end;">
            <button class="clear-filters" id="clearFiltersBtn" type="button">Remove all filters</button>
          </div>
        </section>

        <section class="task-area">
          <div class="section-heading">
            <h3>Tasks</h3>
            <p id="filterSummary" class="toolbar-note"></p>
          </div>
          <div class="task-list" id="taskList"></div>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
